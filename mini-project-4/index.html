<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>registration Form</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-md-4"> <!-- width control -->

                <h4 class="text-center"> register here for an event</h4>
                <div class="card bg-light p-3 shadow-sm">
                    <div class="card-body">
                        <form action="">
                            <div class="mb-3">
                                <label for="firstName" class="form-label">first name</label>
                                <input type="text" class="form-control" id="firstname"
                                    placeholder="enter your first name" required>
                            </div>
                            <div class="mb-3">
                                <label for="lastName" class="form-label">last name</label>
                                <input type="text" class="form-control" id="lasttname"
                                    placeholder="enter your lastt name" required>
                            </div>
                            <div class="mb-3">
                                <label for="email" class="form-label">email</label>
                                <input type="text" class="form-control" id="email"
                                    placeholder="enter your email address" required>
                            </div>
                            <div class="mb-3">
                                <label for="password" class="form-label">password</label>
                                <input type="text" class="form-control" id="password" placeholder="enter your password"
                                    required>
                            </div>
                            <div class="mb-3">
                                <label for="confirm password" class="form-label">confirm password</label>
                                <input type="text" class="form-control" id="confirm password"
                                    placeholder="enter your confirm password" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Select Gender</label>
                                <select class="form-select mb-3">
                                    <option>Select gender</option>
                                    <option>Male</option>
                                    <option>Female</option>
                                    <option>Other</option>
                                </select>
                            </div>
                            <div class="mb-3 form-check">
                                <input type="checkbox" class="form-check-input" id="terms" required>
                                <label class="form-check-label" for="terms"> I Agree to the terms and condition</label>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">register</button>
                        </form>
                    </div>
                </div>
            </div>
            <div class="col-md-4"></div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
