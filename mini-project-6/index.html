<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>registration form using function prototype | class and objects of es6</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>

    <nav class="navbar bg-body-tertiary">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">
                <img src="guvi logo.png" alt="Logo" height="50" class="d-inline-block align-text-top">

            </a>
            registration form
        </div>
    </nav>
    <div class="container m-4">
        <div class="row">
            <div class="col-md-5">
                <h5 class="text-center bg-light text-dark p-2">register your details</h5>
                <form id="registerform">
                    <div class="form-group">

                        <input type="text" class="form-control mb-3" name="name" id="name"
                            placeholder="Enter your name">
                    </div>
                    <div class="form-group">
                        <input type="text" class="form-control mb-3" name="email" id="email"
                            placeholder="Enter your Email">
                    </div>
                    <div class="form-group">
                        <input type="number" class="form-control mb-3" name="adhar" id="adhar"
                            placeholder="Enter your adhar number">
                    </div>



                    <div class="form-check form-check-inline mb-3">
                        <input type="radio" class="form-check-input" name="type" id="male" value="male">
                        <label for="form-check-label">Male</label>
                    </div>
                    <div class="form-check form-check-inline">
                        <input type="radio" class="form-check-input" name="type" id="female" value="female">
                        <label for="form-check-label">Female</label>
                    </div>
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-success">submit</button>
                    </div>
                </form>

            </div>
            <div class="col-md-7">
                <div id="showmessage"></div>
                <h5 class="text-center bg-light text-dark p-2">view details</h5>
                <div class="row">
                    <div class="col-md-7"></div>
                    <div class="col-md-5">


                        <form class="d-flex" role="search">
                            <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search" />
                            <button class="btn btn-outline-success" type="submit">Search</button>
                        </form>
                    </div>
                </div>
                <br>
                <table class="table table-success">
                    <thead>
                        <th scope="col">name</th>
                        <th scope="col">Email</th>
                        <th scope="col">adhar</th>
                        <th scope="col">Gender</th>
                        </tr>
                    </thead>
                    <tbody id="tablebody"></tbody>
                </table>

            </div>
        </div>

    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="./scripts6.js">
    </script>
</body>

</html>
